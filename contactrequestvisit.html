<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Contact — Request a Visit</title>
</head>

<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<header>
    <img src="images/onlylion22.png" alt="Lion Logo" class="top-left-logo size-logo">
    <img src="images/onlylion22.png" alt="Lion Logo" class="top-right-logo size-logo flip-logo">
    <div class="title-nav-container">
        <div class="title-container">
            <h1 class="site-title">TSIPOURO LARISAS</h1>
            <h2 class="site-subtitle">SPIRIT OF THE PLAINS</h2>
        </div>
        <nav aria-label="Primary">
            <ul class="nav-links">
                <li><a href="home.html" class="button nav-button">Home</a></li>
                <li><a href="ourstory.html" class="button nav-button">Our Story</a></li>
                <li><a href="ourtsipouro.html" class="button nav-button nav-button--small">Our Tsipouro</a></li>
                <li><a href="visitus.html" class="button nav-button">Visit Us</a></li>
                <li><a href="contact.html" class="button nav-button active">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>


<main id="main-content">

    <section class="form-frame">

        <header class="form-header">
            <h1>Request a Visit</h1>
            <p>Tell us when and how many people are coming — we’ll confirm by email.</p>
        </header>

        <form class="contact-form" action="#" method="post" novalidate>

            <!-- Επικοινωνία -->
            <div class="form-row form-row-2">
                <div class="field">
                    <label for="rv-name">Full Name</label>
                    <input id="rv-name" name="name" type="text" autocomplete="name" required>
                </div>
                <div class="field">
                    <label for="rv-email">Email</label>
                    <input id="rv-email" name="email" type="email" autocomplete="email" required>
                </div>
            </div>

            <div class="form-row form-row-2">
                <div class="field">
                    <label for="rv-phone">Phone <small>(optional)</small></label>
                    <input id="rv-phone" name="phone" type="tel" autocomplete="tel">
                </div>
                <div class="field">
                    <label for="rv-visitors">Number of Visitors</label>
                    <input id="rv-visitors" name="visitors" type="number" min="1" max="12" value="2" required>
                </div>
            </div>

            <!-- Πότε -->
            <div class="form-row form-row-2">
                <div class="field">
                    <label for="rv-date">Preferred Date</label>
                    <input id="rv-date" name="date" type="date" required>
                </div>
                <div class="field">
                    <label for="rv-time">Preferred Time</label>
                    <select id="rv-time" name="time" required>
                        <option value="">— Choose a slot —</option>
                        <option value="10:00">10:00</option>
                        <option value="11:30">11:30</option>
                        <option value="13:00">13:00</option>
                        <option value="14:30">14:30</option>
                        <option value="16:00">16:00</option>
                    </select>
                </div>
            </div>

            <!-- Τύπος επίσκεψης -->
            <fieldset>
                <legend>Tour Type</legend>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="tour" value="tour" checked>
                        <span>Distillery Tour</span>
                    </label>
                    <label>
                        <input type="radio" name="tour" value="tour-tasting">
                        <span>Tour + Tasting</span>
                    </label>
                    <label>
                        <input type="radio" name="tour" value="tasting">
                        <span>Tasting only</span>
                    </label>
                </div>
            </fieldset>

            <div class="field">
                <label for="rv-notes">Notes <small>(optional)</small></label>
                <textarea id="rv-notes" name="notes" placeholder="Anything we should know? Dietary needs, language preferences, group context…"></textarea>
            </div>

            <div class="form-actions">
                <a class="back-link" href="contact.html">← Back to contact</a>
                <button class="submit-btn" type="submit">Send Request</button>
            </div>

        </form>

    </section>

</main>


<footer>
    <img src="images/onlylion22.png" alt="Lion Logo" class="bottom-left-logo size-logo">
    <img src="images/onlylion22.png" alt="Lion Logo" class="bottom-right-logo flip-logo size-logo">
    <p class="footer-text">© Tsipouro Larisas · Spirit of the Plains</p>
</footer>

</body>

</html>
