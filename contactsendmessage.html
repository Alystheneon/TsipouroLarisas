<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Contact — Send a Message</title>
</head>

<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<header>
    <img src="images/onlylion22.png" alt="Lion Logo" class="top-left-logo size-logo">
    <img src="images/onlylion22.png" alt="Lion Logo" class="top-right-logo size-logo flip-logo">
    <div class="title-nav-container">
        <div class="title-container">
            <h1 class="site-title">TSIPOURO LARISAS</h1>
            <h2 class="site-subtitle">SPIRIT OF THE PLAINS</h2>
        </div>
        <nav aria-label="Primary">
            <ul class="nav-links">
                <li><a href="home.html" class="button nav-button">Home</a></li>
                <li><a href="ourstory.html" class="button nav-button">Our Story</a></li>
                <li><a href="ourtsipouro.html" class="button nav-button nav-button--small">Our Tsipouro</a></li>
                <li><a href="visitus.html" class="button nav-button">Visit Us</a></li>
                <li><a href="contact.html" class="button nav-button active">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>


<main id="main-content">

    <section class="form-frame">

        <header class="form-header">
            <h1>Send a Message</h1>
            <p>For personal questions, feedback or general enquiries.</p>
        </header>

        <form class="contact-form" action="#" method="post" novalidate>

            <div class="form-row form-row-2">
                <div class="field">
                    <label for="sm-name">Full Name</label>
                    <input id="sm-name" name="name" type="text" autocomplete="name" required>
                </div>
                <div class="field">
                    <label for="sm-email">Email</label>
                    <input id="sm-email" name="email" type="email" autocomplete="email" required>
                </div>
            </div>

            <div class="field">
                <label for="sm-subject">Subject</label>
                <input id="sm-subject" name="subject" type="text" required>
            </div>

            <div class="field">
                <label for="sm-message">Message</label>
                <textarea id="sm-message" name="message" minlength="20" required
                          placeholder="Tell us what’s on your mind (at least 20 characters)…"></textarea>
            </div>

            <fieldset>
                <legend>Stay in touch</legend>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="newsletter" value="yes">
                        <span>Subscribe to occasional news from the distillery</span>
                    </label>
                </div>
            </fieldset>

            <div class="form-actions">
                <a class="back-link" href="contact.html">← Back to contact</a>
                <button class="submit-btn" type="submit">Send Message</button>
            </div>

        </form>

    </section>

</main>


<footer>
    <img src="images/onlylion22.png" alt="Lion Logo" class="bottom-left-logo size-logo">
    <img src="images/onlylion22.png" alt="Lion Logo" class="bottom-right-logo flip-logo size-logo">
    <p class="footer-text">© Tsipouro Larisas · Spirit of the Plains</p>
</footer>

</body>

</html>
