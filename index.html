<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <title>Tsipouro Larissas</title>

</head>

<body class="age-check-body">

    <!-- ========== HEADER ========== -->
    <header>
        <img src="images/onlylion22.png" 
             alt="Lion Logo" 
             class="top-left-logo size-logo">
        <!-- src=διαδρομή αρχείου, alt=εναλλακτικό κείμενο, class=στυλ -->

        <img src="images/onlylion22.png" 
             alt="Lion Logo" 
             class="top-right-logo size-logo flip-logo">
        <!-- Η ίδια εικόνα flipped -->
    </header>


    <!-- ========== MAIN: κύριο περιεχόμενο σελίδας ========== -->
    <main class="age-check-container">
        
        <h1 class="age-check-title">Are you 18+ years old?</h1>
        
        <div class="yes-no-buttons-container">
        <!-- Container για να γκρουπάρει τα 2 κουμπιά (flex row). -->

            <a href="home.html" class="button">Yes</a>
            <!-- Αν "Yes", πάει στη σελίδα home.html. -->
            
            <a href="answerisno.html" class="button">No</a>
            <!-- Αν "No", πάει στη σελίδα answerisno.html. -->
        </div>
    </main>


    <!-- ========== FOOTER:========== -->
    <footer>
        <img src="images/onlylion22.png" 
             alt="Lion Logo" 
             class="bottom-left-logo size-logo">

        <img src="images/onlylion22.png" 
             alt="Lion Logo" 
             class="bottom-right-logo size-logo flip-logo">
    </footer>

</body>
</html>
